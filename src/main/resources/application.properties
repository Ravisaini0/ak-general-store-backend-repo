spring.application.name=ak-general-store-backend

server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

jwt.expiration=${JWT_EXPIRATION:86400000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.product-image.max-bytes=${APP_UPLOAD_PRODUCT_IMAGE_MAX_BYTES:10485760}
app.upload.product-image.allowed-extensions=${APP_UPLOAD_PRODUCT_IMAGE_ALLOWED_EXTENSIONS:.jpg,.jpeg,.png,.webp}
app.upload.product-image.allowed-content-types=${APP_UPLOAD_PRODUCT_IMAGE_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}

app.rate-limit.api-requests-per-minute=${APP_RATE_LIMIT_API_REQUESTS_PER_MINUTE:240}
app.rate-limit.auth-requests-per-minute=${APP_RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE:20}
app.rate-limit.otp-requests-per-minute=${APP_RATE_LIMIT_OTP_REQUESTS_PER_MINUTE:5}
app.rate-limit.upload-requests-per-minute=${APP_RATE_LIMIT_UPLOAD_REQUESTS_PER_MINUTE:12}

logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.akgeneralstore=${LOGGING_LEVEL_APP:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

payment.business.name=${PAYMENT_BUSINESS_NAME:AK General Store}
payment.business.logo=${PAYMENT_BUSINESS_LOGO:https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=600&q=80}
payment.razorpay.enabled=${PAYMENT_RAZORPAY_ENABLED:false}
payment.razorpay.key-id=${PAYMENT_RAZORPAY_KEY_ID:}
payment.razorpay.key-secret=${PAYMENT_RAZORPAY_KEY_SECRET:}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.otp.sender-name=${APP_OTP_SENDER_NAME:AK General Store}
app.otp.from-email=${OTP_FROM_EMAIL:${spring.mail.username}}
app.otp.brevo-api-key=${BREVO_API_KEY:}
app.otp.expiry-minutes=${APP_OTP_EXPIRY_MINUTES:10}

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
